---
# --- Controller-owned setup (runs before any roles) ---
- hosts: all
  become: true
  pre_tasks:
    - name: Install roles from requirements.yml
      ansible.builtin.command:
        cmd: ansible-galaxy install -r requirements.yml --force
      delegate_to: localhost
      run_once: true

    - name: Deploy ansible-pull wrapper script
      ansible.builtin.template:
        src: templates/ansible-pull-wrapper.sh.j2
        dest: /usr/local/bin/ansible-pull-wrapper
        owner: root
        group: root
        mode: "0755"

    - name: Deploy ansible-vault-client script
      ansible.builtin.template:
        src: templates/ansible-vault-client.sh.j2
        dest: /usr/local/bin/ansible-vault-client
        owner: root
        group: root
        mode: "0755"

    - name: Deploy ansible-vault-secret script
      ansible.builtin.template:
        src: templates/ansible-vault-secret.sh.j2
        dest: /usr/local/bin/ansible-vault-secret
        owner: root
        group: root
        mode: "0755"

    - name: Deploy ansible-vault-reveal script
      ansible.builtin.template:
        src: templates/ansible-vault-reveal.sh.j2
        dest: /usr/local/bin/ansible-vault-reveal
        owner: root
        group: root
        mode: "0755"

    - name: Deploy ansible-mkpasswd script
      ansible.builtin.template:
        src: templates/ansible-mkpasswd.sh.j2
        dest: /usr/local/bin/ansible-mkpasswd
        owner: root
        group: root
        mode: "0755"

# --- Core roles (applied by group) ---
- hosts: all
  become: true
  roles:
    - scbitworx.base

